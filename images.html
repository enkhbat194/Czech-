<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CzechMN зурагтай карт</title><style>body{margin:0;background:#0b0b0c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,Arial}.app{max-width:560px;margin:auto;padding:16px}.top{display:flex;align-items:center;gap:10px}.brand{font-weight:900;color:#f0aa1a}.home{margin-left:auto;color:#f0aa1a;text-decoration:none;background:#202024;padding:9px 12px;border-radius:10px}.lesson{display:flex;gap:10px;overflow:auto;margin:18px 0}.lesson button{border:0;background:#202024;color:#fff;padding:10px 12px;border-radius:12px;white-space:nowrap}.lesson button.active{background:#f0aa1a;color:#111}.card{background:#171719;border:1px solid #303035;border-radius:22px;padding:15px}.visual{height:260px;border-radius:17px;display:flex;align-items:center;justify-content:center;text-align:center;background:linear-gradient(135deg,#17314b,#24451d);overflow:hidden}.visual .icon{font-size:82px}.visual .letter{font-size:86px;font-weight:900}.visual .num{font-size:92px;font-weight:900}.wordrow{display:flex;gap:12px;align-items:center;margin-top:15px}.word{font-size:31px;font-weight:900;line-height:1.15;flex:1}.speaker{border:0;background:#28282c;color:#fff;border-radius:50%;width:50px;height:50px;font-size:21px}.nav{display:flex;gap:10px;margin-top:14px}.nav button{flex:1;padding:13px;border:0;border-radius:12px;background:#28282c;color:#fff;font-weight:800}.meta{color:#959595;margin:10px 0 16px}.count{color:#aaa;font-size:13px;margin-top:14px}.hint{margin-top:18px;color:#888;font-size:13px;line-height:1.5}</style></head><body><div class="app"><div class="top"><span>🇨🇿</span><span class="brand">CzechMN зурагтай карт</span><a class="home" href="./">⌂ Нүүр</a></div><div id="root"><p>Ачаалж байна…</p></div></div><script>let C=[],li=0,ci=0;const icon={"káva":"☕","čaj":"🍵","voda":"💧","chléb":"🍞","maso":"🥩","zelenina":"🥦","ovoce":"🍎","mléko":"🥛","cukr":"🧊","sůl":"🧂","jídlo":"🍽️","restaurace":"🍴","obchod":"🏪","účet":"🧾","vlak":"🚆","autobus":"🚌","metro":"🚇","tramvaj":"🚊","letiště":"✈️","zastávka":"🚏","nádraží":"🚉","jízdenka":"🎫","taxi":"🚕","auto":"🚗","silnice":"🛣️","doprava":"🚦","Praha":"🏰","ulice":"🏙️","náměstí":"⛲","nemocnice":"🏥","lékárna":"💊","banka":"🏦","pošta":"📮","hotel":"🏨","byt":"🏢","dům":"🏠","toaleta":"🚻","záchod":"🚽","vchod":"🚪","výstup":"🚪","adresa":"📍","matka":"👩","otec":"👨","sestra":"👧","bratr":"👦","manžel":"👨","manželka":"👩","dítě":"🧒","rodina":"👨‍👩‍👧","kamarád":"🧑‍🤝‍🧑","přítel":"👨","přítelkyně":"👩","práce":"🧰","firma":"🏢","šéf":"🧑‍💼","kolega":"👥","směna":"🕒","peníze":"💵","plat":"💰","hodina":"🕐","dnes":"📅","zítra":"📆","včera":"🗓️","ráno":"🌅","odpoledne":"🌤️","večer":"🌆","noc":"🌙","slunce":"☀️","déšť":"🌧️","sníh":"❄️","vítr":"💨","teplo":"🔥","zima":"🥶","horko":"🌡️","chladno":"🧥","počasí":"🌦️","Ano":"👍","Ne":"👎","Nerozumím":"❓","Rozumím.":"✅","pomoc":"🆘","pozor":"⚠️","nebezpečí":"☢️"};const nums={jedna:'1',dva:'2',tři:'3',čtyři:'4',pět:'5',šest:'6',sedm:'7',osm:'8',devět:'9',deset:'10',jedenáct:'11',dvanáct:'12',třináct:'13',čtrnáct:'14',patnáct:'15',šestnáct:'16',sedmnáct:'17',osmnáct:'18',devatenáct:'19',dvacet:'20',třicet:'30',čtyřicet:'40',padesát:'50',šedesát:'60',sedmdesát:'70',osmdesát:'80',devadesát:'90',sto:'100',tisíc:'1000'};function talk(t){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='cs-CZ';u.rate=.78;speechSynthesis.speak(u)}function vis(t,l){if(l.id==='alphabet')return `<div class="letter">${t}</div>`;if(nums[t])return `<div class="num">${nums[t]}</div>`;return `<div class="icon">${icon[t]||'🗣️'}</div>`}function draw(){let l=C[li],t=l.items[ci];root.innerHTML=`<div class="lesson">${C.map((x,i)=>`<button class="${i===li?'active':''}" onclick="li=${i};ci=0;draw()">${x.emoji} ${x.title}</button>`).join('')}</div><div class="count">${l.title} · ${ci+1}/${l.items.length}</div><div class="card"><div class="visual">${vis(t,l)}</div><div class="wordrow"><div class="word">${t}</div><button class="speaker" onclick="talk(${JSON.stringify(t)})">🔊</button></div></div><div class="nav"><button onclick="ci=Math.max(0,ci-1);draw()">← Өмнөх</button><button onclick="ci=Math.min(C[li].items.length-1,ci+1);draw()">Дараах →</button></div><div class="hint">Одоогоор бүх текстэд зурагт утгын карт автоматаар тавигдсан. Дараагийн шатанд бодит photo/illustration asset-уудаар солих бүтэц энэ хуудсан дээр бэлэн.</div>`}fetch('./data/czech-course.json').then(r=>r.json()).then(d=>{C=d.lessons;draw()})</script></body></html>
