<!doctype html><meta charset="utf-8"><title>CzechMN</title><div id="root"></div><script>const words=[['Já','Би'],['Ty','Чи'],['On','Тэр (эр)'],['Ona','Тэр (эм)']];let step=0,phase=0;const root=document.getElementById('root');function view(){let w=words[step];root.innerHTML=phase===0?'<h1>'+w[0]+'</h1><p>'+w[1]+'</p><button id="go">Дараах үг</button>':'<h2>'+w[0]+' = ?</h2>'+words.map(x=>'<button>'+x[1]+'</button>').join('');document.querySelectorAll('button').forEach(b=>b.addEventListener('click',advance))}function advance(){step++;if(step>=words.length){step=0;phase++;if(phase>1){root.innerHTML='<h1>Дууслаа</h1>';return}}view()}view()</script>
