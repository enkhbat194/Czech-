<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>CzechMN — Czech хэл сурах</title>
<style>
:root{--bg:#090909;--panel:#171717;--panel2:#202020;--line:#303030;--text:#f5f5f5;--muted:#8a8a8a;--gold:#f0aa1a;--green:#4bc05d;--red:#cf4b42;--blue:#3686e9}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}button{font:inherit}.app{max-width:540px;margin:0 auto;min-height:100vh;background:var(--bg)}.topbar{position:sticky;top:0;z-index:20;height:62px;display:flex;align-items:center;gap:10px;padding:0 16px;background:rgba(15,15,15,.96);border-bottom:1px solid #252525;backdrop-filter:blur(14px)}.brand{font-weight:900;color:var(--gold);letter-spacing:.2px}.tag{font-size:12px;color:#575757}.homeBtn{margin-left:auto;border:0;background:#242424;color:var(--gold);padding:8px 12px;border-radius:10px;font-weight:800;cursor:pointer}.content{padding:18px 14px 42px}.hero{position:relative;overflow:hidden;border:1px solid #1c3235;border-radius:22px;padding:22px 20px;background:linear-gradient(135deg,#0d0d24 0%,#0a1d31 58%,#0c201e 100%)}.hero:after{content:"🇨🇿";position:absolute;right:-10px;top:-10px;font-size:100px;opacity:.08}.eyebrow{font-size:11px;letter-spacing:3px;color:var(--gold);font-weight:800}h1{font-size:30px;line-height:1.13;margin:8px 0 9px;position:relative;z-index:1}.desc{color:#858585;font-size:14px;line-height:1.5;max-width:370px;position:relative;z-index:1}.stats{display:flex;gap:22px;margin:19px 0 13px}.stat b{display:block;font-size:23px}.stat span{font-size:11px;color:#777}.gold{color:var(--gold)}.green{color:var(--green)}.progress{height:8px;border-radius:999px;background:#2b2b2b;overflow:hidden}.progress>i{display:block;height:100%;border-radius:999px;background:var(--gold);transition:width .35s}.percent{margin-top:5px;color:#666;font-size:11px}.quick,.lesson{width:100%;display:flex;align-items:center;gap:13px;border-radius:17px;text-align:left;cursor:pointer}.quick{margin-top:17px;padding:15px 17px;border:1px solid #234925;background:#0d1c0e}.quick strong{color:var(--green)}.quick small{display:block;color:#6e6e6e;margin-top:4px}.arrow{margin-left:auto;color:#666;font-size:25px}.sectionTitle{font-weight:850;margin:27px 0 11px;font-size:16px}.lesson{border:1px solid var(--line);background:var(--panel);padding:14px 15px;margin-top:9px}.lesson:hover{border-color:var(--gold)}.lessonIcon{font-size:29px;width:40px;text-align:center}.lessonMain{flex:1;min-width:0}.lessonTop{display:flex;align-items:center;gap:8px;margin-bottom:6px}.lessonTitle{font-weight:800;font-size:15px}.badge{font-size:11px;padding:3px 8px;border-radius:99px;background:var(--green);color:#fff;font-weight:900}.lessonMeta{color:#666;font-size:11px;margin-top:4px}.note{margin-top:22px;background:#0c0c20;border:1px solid #1d1d42;border-radius:15px;padding:14px 15px;color:#727272;font-size:12px;line-height:1.55}.note b{display:block;color:var(--gold);margin-bottom:5px}.header{display:flex;align-items:center;gap:10px;margin-bottom:16px}.back{background:none;color:var(--gold);border:0;font-size:28px;cursor:pointer;padding:0 3px}.header h2{margin:0;font-size:19px}.header small{color:#777;margin-left:auto}.tabs{display:flex;gap:5px;padding:4px;border-radius:13px;background:var(--panel);margin-bottom:20px}.tab{flex:1;border:0;background:transparent;color:#878787;padding:9px 4px;border-radius:10px;font-weight:850;cursor:pointer;font-size:12px}.tab.active{background:var(--gold);color:#111}.cardCounter{display:flex;justify-content:space-between;color:#8b8b8b;font-size:13px;margin-bottom:10px}.flashCard{margin-top:24px;border:2px solid var(--gold);border-radius:23px;padding:24px 22px;min-height:245px;background:#0c0c20;cursor:pointer;display:flex;flex-direction:column;justify-content:center;transition:.18s}.flashCard.flipped{border-color:var(--green);background:#0c1b0d}.label{font-size:11px;color:var(--gold);letter-spacing:3px;font-weight:900}.flipped .label{color:var(--green)}.wordrow{display:flex;align-items:center;gap:14px;margin-top:12px}.word{font-size:39px;font-weight:950;line-height:1.05;word-break:break-word}.pron{margin-top:9px;color:#909090;font-size:17px}.speaker{margin-left:auto;border:0;background:#202020;border-radius:50%;width:47px;height:47px;color:#fff;font-size:20px;cursor:pointer}.flipHint{margin-top:28px;color:#505050;text-align:center;font-size:13px}.example{margin-top:20px;padding-top:14px;border-top:1px solid #1e3820;color:#9a9a9a;font-style:italic;font-size:14px;line-height:1.45}.rateRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.rate{border:0;border-radius:12px;padding:12px 8px;color:#fff;font-weight:800;cursor:pointer;font-size:13px}.r1{background:#b83c35}.r3{background:#cf751e}.r4{background:#26964a}.r5{background:#2779c9}.navRow{display:flex;gap:10px;margin-top:16px}.navRow button{flex:1;border:0;border-radius:13px;background:#202020;color:#fff;padding:13px;font-weight:850;cursor:pointer}.navRow button:disabled{opacity:.35}.listItem{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:8px}.listItem b{display:block}.listItem small{color:#777}.listItem .mn{display:block;color:var(--gold);margin-top:4px;font-weight:700}.quizWord{background:#0c0c20;border:2px solid var(--gold);border-radius:17px;padding:21px;margin-bottom:12px}.quizWord b{font-size:32px}.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}.option{min-height:56px;background:var(--panel);border:1px solid var(--line);color:#fff;border-radius:12px;padding:9px;cursor:pointer;font-weight:700}.option.correct{border-color:var(--green);background:#0e2c10}.option.wrong{border-color:var(--red);background:#2e0e0d}.alphaInfo{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;color:#999;font-size:13px;line-height:1.55;margin-bottom:11px}.alphaInfo b{display:block;color:var(--gold);margin-bottom:5px}.alphaGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.alphaBtn{background:var(--panel);border:1px solid var(--line);color:#fff;border-radius:13px;padding:12px;text-align:left;cursor:pointer}.alphaBtn strong{font-size:28px;color:var(--gold);margin-right:10px}.alphaBtn small{color:#8b8b8b}.mnGrid{grid-template-columns:repeat(5,1fr)}.mnGrid .alphaBtn{text-align:center;padding:10px 4px}.mnGrid .alphaBtn strong{margin:0;display:block;color:#fff}.mnGrid .alphaBtn small{font-size:10px}.empty{color:#777;text-align:center;padding:35px 0}
</style>
</head>
<body>
<div id="root"></div>
<script>
const LESSONS=[{id:"basics",title:"Үндсэн мэндчилгээ",emoji:"👋",level:"A1",cards:[["Dobrý den","Сайн байна уу","Доб-ри дэн","Dobrý den, jak se máte?"],["Ahoj","Сайн уу / Баяртай","Ахой","Ahoj! Jak se máš?"],["Na shledanou","Баяртай (албан ёсны)","На схлэ-даноу","Na shledanou!"],["Prosím","Гуйя / Зав гаргана уу","Про-сим","Prosím, kde je záchod?"],["Děkuji","Баярлалаа","Дье-куй","Děkuji moc!"],["Promiňte","Уучлаарай","Про-минь-тэ","Promiňte, nerozumím."],["Ano","Тийм","Ано","Ano, rozumím."],["Ne","Үгүй","Нэ","Ne, děkuji."]]},{id:"numbers",title:"Тоо",emoji:"🔢",level:"A1",cards:[["jedna","Нэг (1)","Ед-на","Jedna káva, prosím."],["dva","Хоёр (2)","Два","Dva lístky, prosím."],["tři","Гурав (3)","Тржи","Tři hodiny."],["čtyři","Дөрөв (4)","Чты-жи","Čtyři lidé."],["pět","Тав (5)","Пет","Za pět minut."],["deset","Арав (10)","Дэ-сэт","Deset korun."],["sto","Зуу (100)","Сто","Sto korun."],["tisíc","Мянга (1000)","Ти-сиц","Tisíc korun."]]},{id:"intro",title:"Өөрийгөө танилцуулах",emoji:"🙋",level:"A1",cards:[["Jmenuji se…","Миний нэр … гэдэг","Ймэ-ну-йи сэ","Jmenuji se Bat."],["Jsem z Mongolska","Би Монголоос ирсэн","Йсэм з Монголска","Jsem z Mongolska."],["Kolik je ti let?","Чи хэдэн настай вэ?","Ко-лик йэ ти лэт","Je mi dvacet let."],["Mluvíte česky?","Та чехээр ярьдаг уу?","Млувите чэски","Trochu mluvím česky."],["Nerozumím","Би ойлгохгүй байна","Нэрозумим","Promiňte, nerozumím."],["Mluvte pomalu","Аажуухан ярина уу","Млувтэ помалу","Prosím, mluvte pomalu."]]},{id:"food",title:"Хоол & Кафе",emoji:"☕",level:"A1",cards:[["káva","Кофе","Ка-ва","Jednu kávu, prosím."],["čaj","Цай","Чай","Černý čaj, prosím."],["voda","Ус","Во-да","Sklenici vody, prosím."],["chléb","Талх","Хлэб","Čerstvý chléb."],["maso","Мах","Ма-со","Hovězí maso."],["zelenina","Хүнсний ногоо","Зэ-лэ-ни-на","Čerstvá zelenina."]]},{id:"transport",title:"Тээвэр & Зам",emoji:"🚌",level:"A2",cards:[["vlak","Галт тэрэг","Влак","Vlak do Prahy."],["autobus","Автобус","Ауто-бус","Autobus číslo pět."],["metro","Метро","Мэт-ро","Stanice metra."],["letiště","Нисэх онгоцны буудал","Лэ-тиш-тэ","Jak se dostanu na letiště?"],["zastávka","Буудал / зогсоол","Зас-тав-ка","Kde je zastávka?"],["jízdenka","Тасалбар","Йиз-дэн-ка","Jednu jízdenku, prosím."]]}];
const CZ_SPECIAL=[["á","А урт дуудлага","ааа"],["č","Ч шиг","ч"],["ď","Дь зөөлөн","дь"],["é","Э урт дуудлага","эээ"],["ě","Йе / е дуудлага","йе"],["í","И урт дуудлага","иии"],["ň","Нь зөөлөн","нь"],["ó","О урт дуудлага","ооо"],["ř","Р + Ж хосолсон","рж"],["š","Ш шиг","ш"],["ť","Ть зөөлөн","ть"],["ú / ů","У урт дуудлага","ууу"],["ý","И урт дуудлага","иии"],["ž","Ж шиг","ж"]];
const MN="А Б В Г Д Е Ё Ж З И Й К Л М Н О Ө П Р С Т У Ү Ф Х Ц Ч Ш Щ Ъ Ы Ь Э Ю Я".split(" ");
let state={screen:"home",lesson:null,mode:"flash",idx:0,flipped:false,quiz:null};let progress=JSON.parse(localStorage.getItem("czechmn_progress")||"{}");function save(){localStorage.setItem("czechmn_progress",JSON.stringify(progress))}function key(l,c){return l.id+"_"+c[0]}function speak(t){if(!("speechSynthesis" in window))return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang="cs-CZ";u.rate=.78;speechSynthesis.speak(u)}function complete(l){return l.cards.filter(c=>progress[key(l,c)]).length}function totalLearned(){return Object.keys(progress).length}function pct(a,b){return b?Math.round(a/b*100):0}function bar(v,max,color="var(--gold)"){return `<div class="progress"><i style="width:${pct(v,max)}%;background:${color}"></i></div>`}function home(){const total=LESSONS.reduce((n,l)=>n+l.cards.length,0),learned=totalLearned();return `<div class="hero"><div class="eyebrow">МОНГОЛ → CZECH</div><h1>Czech Хэл<br>Сурах Апп</h1><div class="desc">Монгол залуусдаа зориулсан — эхлээд амьдрал дээр хэрэглэх үг, өгүүлбэр, дуудлага.</div><div class="stats"><div class="stat"><b class="gold">${learned}</b><span>сурсан үг</span></div><div class="stat"><b>${total}</b><span>нийт үг</span></div><div class="stat"><b class="green">${LESSONS.length}</b><span>хичээл</span></div></div>${bar(learned,total)}<div class="percent">${pct(learned,total)}% дуусгасан</div></div><button class="quick" onclick="goAlphabet()"><div style="font-size:28px">🔤</div><div><strong>Цагаан толгой</strong><small>Czech & Монгол үсэг + дуудлага</small></div><div class="arrow">›</div></button><div class="sectionTitle">📖 Хичээлүүд</div>${LESSONS.map((l,i)=>{let d=complete(l);return `<button class="lesson" onclick="openLesson(${i})"><div class="lessonIcon">${l.emoji}</div><div class="lessonMain"><div class="lessonTop"><span class="lessonTitle">${l.title}</span><span class="badge">${l.level}</span></div>${bar(d,l.cards.length,d===l.cards.length?"var(--green)":"var(--gold)")}<div class="lessonMeta">${d}/${l.cards.length} карт</div></div><div class="arrow">›</div></button>`}).join("")}<div class="note"><b>🧠 Давталтын зарчим</b>“Мэдэхгүй” дарсан үгийг ойр ойрхон, “Амархан” дарсан үгийг ховор давтана. Одоохондоо ахиц browser дээр хадгалагдана.</div>`}function lessonView(){const l=state.lesson,c=l.cards[state.idx],total=l.cards.length;let body="";if(state.mode==="flash")body=`<div class="cardCounter"><span>Карт ${state.idx+1} / ${total}</span></div>${bar(state.idx,total-1)}<div class="flashCard ${state.flipped?"flipped":""}" onclick="flipCard()">${state.flipped?`<div class="label">МОНГОЛ</div><div class="word">${c[1]}</div><div class="example">“${c[3]}”</div><button class="speaker" onclick="event.stopPropagation();speak(${JSON.stringify(c[3])})">🔊</button>`:`<div class="label">CZECH</div><div class="wordrow"><div><div class="word">${c[0]}</div><div class="pron">[ ${c[2]} ]</div></div><button class="speaker" onclick="event.stopPropagation();speak(${JSON.stringify(c[0])})">🔊</button></div><div class="flipHint">дарж эргүүлнэ ↓</div>`}</div>${state.flipped?`<div class="rateRow"><button class="rate r1" onclick="rate(1)">😓 Мэдэхгүй</button><button class="rate r3" onclick="rate(3)">🤔 Бараг</button><button class="rate r4" onclick="rate(4)">😊 Мэднэ</button><button class="rate r5" onclick="rate(5)">⚡ Амархан</button></div>`:""}<div class="navRow"><button onclick="move(-1)" ${state.idx===0?"disabled":""}>← Өмнөх</button><button onclick="move(1)" ${state.idx===total-1?"disabled":""}>Дараах →</button></div>`;else if(state.mode==="list")body=l.cards.map(c=>`<div class="listItem"><div style="flex:1"><b>${c[0]}</b><small>[ ${c[2]} ]</small><span class="mn">${c[1]}</span></div><button class="speaker" onclick="speak(${JSON.stringify(c[0])})">🔊</button></div>`).join("");else body=quizView(l);return `<div class="header"><button class="back" onclick="goHome()">←</button><div><h2>${l.emoji} ${l.title}</h2><span class="badge">${l.level}</span></div><small>${total} карт</small></div><div class="tabs"><button class="tab ${state.mode==="flash"?"active":""}" onclick="setMode('flash')">🃏 Карт</button><button class="tab ${state.mode==="quiz"?"active":""}" onclick="setMode('quiz')">📝 Тест</button><button class="tab ${state.mode==="list"?"active":""}" onclick="setMode('list')">📋 Жагсаалт</button></div>${body}`}function ensureQuiz(l){if(!state.quiz){const cards=[...l.cards].sort(()=>Math.random()-.5);state.quiz={cards,idx:0,score:0,selected:null,finished:false}}}function quizView(l){ensureQuiz(l);const q=state.quiz;if(q.finished)return `<div class="empty"><div style="font-size:54px">${q.score>=q.cards.length*.8?"🎉":"💪"}</div><h2>${q.score} / ${q.cards.length} зөв</h2><p>${q.score>=q.cards.length*.8?"Сайн байна. Дараагийн хичээл рүү ор.":"Тестийг дахин хийж болно."}</p><button class="homeBtn" onclick="restartQuiz()">Дахин тест →</button></div>`;const card=q.cards[q.idx];const opts=[card[1],...q.cards.filter(x=>x[1]!==card[1]).sort(()=>Math.random()-.5).slice(0,3).map(x=>x[1])].sort(()=>Math.random()-.5);q.opts??=opts;return `<div class="cardCounter"><span>${q.idx+1} / ${q.cards.length}</span><span class="gold">✓ ${q.score}</span></div>${bar(q.idx,q.cards.length)}<div class="quizWord"><div class="label">CZECH → МОНГОЛ</div><div style="display:flex;align-items:center;gap:10px;margin-top:9px"><b>${card[0]}</b><button class="speaker" onclick="speak(${JSON.stringify(card[0])})">🔊</button></div><div class="pron">[ ${card[2]} ]</div></div><div class="options">${q.opts.map(x=>`<button class="option ${q.selected?(x===card[1]?"correct":x===q.selected?"wrong":""):""}" onclick="pickQuiz(${JSON.stringify(x)})">${x}</button>`).join("")}</div>`}function alphabet(){return `<div class="header"><button class="back" onclick="goHome()">←</button><h2>🔤 Цагаан толгой</h2></div><div class="tabs"><button class="tab active" id="czTab" onclick="toggleAlpha('cz')">🇨🇿 Czech үсэг</button><button class="tab" id="mnTab" onclick="toggleAlpha('mn')">🇲🇳 Монгол үсэг</button></div><div id="alphaContent">${alphaCZ()}</div>`}function alphaCZ(){return `<div class="alphaInfo"><b>💡 Czech онцгой үсэг</b>Чех хэлэнд урт богино эгшиг болон зөөлрүүлсэн гийгүүлэгч чухал. Доорх үсэг бүрийг дарж дуудлагыг сонс.</div><div class="alphaGrid">${CZ_SPECIAL.map(x=>`<button class="alphaBtn" onclick="speak(${JSON.stringify(x[0])})"><strong>${x[0]}</strong><span>${x[1]}<br><small>[ ${x[2]} ] 🔊</small></span></button>`).join("")}</div>`}function alphaMN(){return `<div class="alphaInfo"><b>📖 Монгол кирилл</b>35 үсэгтэй. Энэ хэсэг нь чех үсгийг монгол авиагаар ялгаж ойлгоход тусална.</div><div class="alphaGrid mnGrid">${MN.map(x=>`<button class="alphaBtn" onclick="speakMN(${JSON.stringify(x)})"><strong>${x}</strong><small>🔊</small></button>`).join("")}</div>`}function render(){document.getElementById("root").innerHTML=`<div class="app"><div class="topbar"><span>🇨🇿</span><span class="brand">CzechMN</span><span class="tag">— Монгол залуусдаа</span>${state.screen!=="home"?'<button class="homeBtn" onclick="goHome()">⌂ Нүүр</button>':""}</div><main class="content">${state.screen==="home"?home():state.screen==="lesson"?lessonView():alphabet()}</main></div>`}function openLesson(i){state={screen:"lesson",lesson:LESSONS[i],mode:"flash",idx:0,flipped:false,quiz:null};render()}function goHome(){state={screen:"home",lesson:null,mode:"flash",idx:0,flipped:false,quiz:null};render()}function goAlphabet(){state={screen:"alphabet"};render()}function flipCard(){state.flipped=!state.flipped;render()}function move(n){state.idx=Math.max(0,Math.min(state.lesson.cards.length-1,state.idx+n));state.flipped=false;render()}function rate(q){let c=state.lesson.cards[state.idx];progress[key(state.lesson,c)]={quality:q,reviewedAt:new Date().toISOString()};save();state.flipped=false;if(state.idx<state.lesson.cards.length-1)state.idx++;render()}function setMode(m){state.mode=m;state.flipped=false;state.quiz=null;render()}function pickQuiz(a){let q=state.quiz;if(q.selected)return;let card=q.cards[q.idx];q.selected=a;if(a===card[1]){q.score++;speak(card[0])}render();setTimeout(()=>{if(q.idx+1>=q.cards.length){q.finished=true}else{q.idx++;q.selected=null;q.opts=null}render()},800)}function restartQuiz(){state.quiz=null;render()}function toggleAlpha(x){document.getElementById("alphaContent").innerHTML=x==="cz"?alphaCZ():alphaMN();document.getElementById("czTab").classList.toggle("active",x==="cz");document.getElementById("mnTab").classList.toggle("active",x==="mn")}function speakMN(t){if(!("speechSynthesis" in window))return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang="mn-MN";speechSynthesis.speak(u)}render();
</script>
</body>
</html>
