<!doctype html><html lang="mn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CzechMN</title><style>:root{--bg:#090909;--panel:#171719;--line:#303036;--gold:#f6ae18;--muted:#9a9a9f;--green:#54c86b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial}.app{max-width:560px;margin:auto;min-height:100vh}.top{height:62px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #252529}.brand{font-weight:900;color:var(--gold);font-size:20px}.main{padding:18px 14px 44px}.hero{padding:22px;border:1px solid #24444a;border-radius:22px;background:linear-gradient(135deg,#111128,#09263c,#0d2818)}.hero small,label{color:var(--gold);font-weight:900;letter-spacing:3px}.hero h1{font-size:32px;margin:8px 0}.hero p{color:var(--muted);line-height:1.45}.hero b{font-size:13px;color:#ddd}h2{font-size:16px;margin:26px 0 10px}.lessons{display:grid;gap:9px}.lesson{width:100%;display:flex;align-items:center;gap:13px;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:16px;color:white;text-align:left}.lesson span{font-size:27px}.lesson b,.lesson small{display:block}.lesson small{margin-top:4px;color:#777}.lesson i{margin-left:auto;color:#777;font-size:25px}.lessonHead{display:flex;gap:10px;align-items:center;margin-bottom:14px}.lessonHead button{border:0;background:transparent;color:var(--gold);font-size:28px}.lessonHead div{flex:1}.lessonHead small{float:right;color:#777}.bar{height:8px;background:#29292d;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:var(--gold);border-radius:99px}.flash{margin-top:22px;min-height:300px;border:2px solid var(--gold);border-radius:24px;padding:28px 24px;background:#0d0d20;display:flex;flex-direction:column;justify-content:center}.flash.back{border-color:var(--green);background:#0d2110}.flash.back label{color:var(--green)}.flash h1{font-size:44px;line-height:1.08;margin:18px 0}.wordLine{display:flex;gap:10px;align-items:flex-start}.wordLine h1{flex:1}.wordLine button{border:0;background:#29292d;color:#fff;border-radius:50%;width:52px;height:52px;font-size:20px;margin-top:12px}.flash small{color:#666;text-align:center;margin-top:auto}.pron{font-size:20px;color:#ddd;line-height:1.4}.nav{display:flex;gap:10px;margin-top:15px}.nav button{flex:1;border:0;background:#29292d;color:#fff;padding:14px;border-radius:14px;font-weight:800}.nav button:disabled{opacity:.35}.error{padding:40px;color:#f77}</style></head><body><div class="app"><header class="top">🇨🇿 <span class="brand">CzechMN</span></header><main id="root" class="main">Ачаалж байна…</main></div><script src="./app.js"></script></body></html>
